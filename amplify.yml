version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20 || nvm install 20
            - npm ci --prefer-offline --no-audit
        build:
          commands:
            - npm run build
      artifacts:
        # Nuxt/Nitro "aws-amplify" preset emits the SSR artifact at .amplify-hosting
        # Confirm current preset name against Nuxt + Amplify docs at deploy time.
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .nuxt/**/*
